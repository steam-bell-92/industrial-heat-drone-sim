<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Industrial Heat-Zone Drone Simulation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="hud">
      <div class="title">Industrial Heat-Zone Search</div>
      <div class="sub">Drone Thermal Patrol | Real-Time 3D Simulation</div>
      <div id="controls"></div>
      <div id="metrics"></div>
    </div>
    <div id="telemetry">
      <div class="title">DRL Telemetry</div>
      <div class="sub">State, Action Values, Learning Params</div>
      <div id="drl-metrics"></div>
      <div style="margin-top: 20px; display: flex; gap: 10px; flex-direction: column;">
        <button id="doc-btn" class="doc-button" title="View Documentation">📚 Documentation</button>
      </div>
    </div>
    <canvas id="scene"></canvas>
   <style>
     .doc-button, .logout-button {
       padding: 10px 15px;
       background: rgba(0, 225, 255, 0.1);
       border: 2px solid rgba(0, 225, 255, 0.3);
       color: #00e1ff;
       border-radius: 8px;
       cursor: pointer;
       font-weight: 600;
       font-size: 12px;
       transition: all 0.3s ease;
       width: 100%;
       text-align: center;
     }
     .doc-button:hover, .logout-button:hover {
       background: rgba(0, 225, 255, 0.2);
       box-shadow: 0 0 15px rgba(0, 225, 255, 0.3);
       transform: translateY(-2px);
     }
   </style>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
