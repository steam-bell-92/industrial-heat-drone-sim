<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kaggle Training Launcher</title>
  <style>
    body { font-family: Arial, sans-serif; background: #071428; color: #dfeffa; padding: 20px; }
    .card { background: linear-gradient(135deg,#0a1628,#0d2438); padding: 20px; border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); }
    label { display:block; margin-top:10px; font-size:14px; }
    input, select { width:100%; padding:8px; margin-top:6px; border-radius:4px; border:1px solid rgba(0,225,255,0.08); background: rgba(255,255,255,0.02); color: #dfeffa }
    .muted { color:#91b8d9; font-size:13px }
    button { margin-top:12px; padding:10px 14px; background:#00e1ff; color:#042033; border:none; border-radius:6px; cursor:pointer }
    pre { background:#011421; padding:12px; border-radius:6px; overflow:auto }
  </style>
</head>
<body>
  <div class="card">
    <h2>Start Kaggle Training</h2>
    <p class="muted">Start Kaggle training from the web UI (requires backend server).</p>

    <label>Map image path (relative to repo)</label>
    <input id="map" placeholder="e.g. data/maps/siteA.png" />

    <label>Project id</label>
    <input id="project" placeholder="e.g. my_project_01" />

    <label>Use default API key?</label>
    <select id="useDefault">
      <option value="true">Use repository default</option>
      <option value="false">Provide my API key</option>
    </select>

    <label>Or paste Kaggle API token (optional)</label>
    <input id="token" placeholder="paste Kaggle token here (overrides default)" />

    <h3>RL Parameters</h3>
    <label>DYNA_TRAIN_SECONDS</label>
    <input id="trainSeconds" value="5400" />
    <label>DYNA_PLANNING_STEPS</label>
    <input id="planningSteps" value="60" />
    <label>DYNA_EPISODES</label>
    <input id="episodes" value="15000" />

    <label><input type="checkbox" id="waitKernel" /> Wait for kernel and auto-download outputs</label>

    <button id="start">Start Training (via API)</button>

    <h4>Server Response / Run Id</h4>
    <pre id="resp">(no run yet)</pre>

    <p class="muted">Note: You must run the API server at `server/index.js` (`npm install` then `npm start` from the `server` folder).</p>
  </div>

  <script>
    const API_BASE_URL = (window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1'))
      ? 'http://localhost:3500'
      : window.location.origin;

    document.getElementById('start').addEventListener('click', async () => {
      const map = document.getElementById('map').value || 'data/maps/site.png'
      const project = document.getElementById('project').value || 'project01'
      const useDefault = document.getElementById('useDefault').value === 'true'
      const token = document.getElementById('token').value.trim()
      const trainSeconds = document.getElementById('trainSeconds').value
      const planningSteps = document.getElementById('planningSteps').value
      const episodes = document.getElementById('episodes').value
      const wait = document.getElementById('waitKernel').checked

      const payload = {
        mapImage: map,
        projectId: project,
        useDefaultKey: useDefault,
        token: token,
        trainSeconds: trainSeconds,
        planningSteps: planningSteps,
        episodes: episodes,
        waitKernel: wait
      }

      try {
        const resp = await fetch(`${API_BASE_URL}/api/kaggle/start`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        })
        const data = await resp.json()
        document.getElementById('resp').innerText = JSON.stringify(data, null, 2)
      } catch (e) {
        document.getElementById('resp').innerText = String(e)
      }
    })
  </script>
</body>
</html>
