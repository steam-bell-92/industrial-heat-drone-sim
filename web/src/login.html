<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRL Industrial Heat-Zone - Secure Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a52 50%, #0d2438 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        .bg-glow-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 225, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite;
        }

        .bg-glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
            animation: float-reverse 25s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        @keyframes float-reverse {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, -30px); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(13, 36, 56, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 225, 255, 0.2);
            border-radius: 20px;
            padding: 60px 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        0 0 40px rgba(0, 225, 255, 0.1),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #00e1ff 0%, #0099cc 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(0, 225, 255, 0.3);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 10px 30px rgba(0, 225, 255, 0.3);
            }
            50% {
                box-shadow: 0 10px 40px rgba(0, 225, 255, 0.6);
            }
        }

        .login-header h1 {
            color: #00e1ff;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 225, 255, 0.3);
        }

        .login-header p {
            color: #8ab4d7;
            font-size: 14px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #00e1ff;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 225, 255, 0.2);
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            background: rgba(0, 225, 255, 0.05);
            border-color: #00e1ff;
            box-shadow: 0 0 15px rgba(0, 225, 255, 0.2),
                        inset 0 0 15px rgba(0, 225, 255, 0.05);
        }

        .form-group input:hover {
            border-color: rgba(0, 225, 255, 0.4);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00e1ff 0%, #0099cc 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 225, 255, 0.2);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 225, 255, 0.4);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            animation: shake 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            color: #6b8fa3;
            font-size: 12px;
        }

        .footer-text a {
            color: #00e1ff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer-text a:hover {
            text-shadow: 0 0 10px rgba(0, 225, 255, 0.5);
        }

        /* Loading animation */
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 225, 255, 0.3);
            border-top: 2px solid #00e1ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        .login-btn.loading .spinner {
            display: block;
        }

        .login-btn.loading {
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .login-container {
                padding: 40px 30px;
                border-radius: 15px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .form-group input {
                padding: 12px 15px;
                font-size: 14px;
            }

            .login-btn {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="login-container">
        <div class="login-header">
            <div class="logo">🚁</div>
            <h1>DRL SYSTEM</h1>
            <p>Industrial Heat-Zone Detection</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="userId">User ID</label>
                <input
                    type="text"
                    id="userId"
                    placeholder="Enter your user ID"
                    required
                    autocomplete="username"
                />
                <div class="error-message" id="userIdError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                />
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                LOGIN
                <span class="spinner"></span>
            </button>

            <div class="error-message" id="generalError"></div>
        </form>

        <div class="footer-text">
            <p>Secure Access • Enterprise Grade • Industrial IoT</p>
        </div>
    </div>

    <script>
        // Credentials
        const VALID_ID = 'Cppstest1';
        const VALID_PASS = 'cppstest1';

        function handleLogin(event) {
            event.preventDefault();

            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const generalError = document.getElementById('generalError');

            // Clear previous errors
            document.getElementById('userIdError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');
            generalError.classList.remove('show');

            // Validate
            if (!userId || !password) {
                if (!userId) {
                    document.getElementById('userIdError').textContent = 'User ID is required';
                    document.getElementById('userIdError').classList.add('show');
                }
                if (!password) {
                    document.getElementById('passwordError').textContent = 'Password is required';
                    document.getElementById('passwordError').classList.add('show');
                }
                return;
            }

            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            // Simulate API call
            setTimeout(() => {
                if (userId === VALID_ID && password === VALID_PASS) {
                    // Store authentication
                    localStorage.setItem('drl_authenticated', 'true');
                    localStorage.setItem('drl_user', userId);
                    
                    // Redirect to main app
                    window.location.href = '/';
                } else {
                    // Show error
                    generalError.textContent = 'Invalid credentials. Please try again.';
                    generalError.classList.add('show');
                    
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    
                    // Clear password field
                    document.getElementById('password').value = '';
                }
            }, 1000);
        }

        // Enter key support
        document.getElementById('loginForm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
